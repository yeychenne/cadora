# Cadora "FE-builder + PDF" node — a reusable, DOMAIN-AGNOSTIC topology that turns ANY
# deterministic case-scoring engine into  engine + analyst GUI + PDF, contract-first.
#
# Usage:
#   cadora run examples/analyst-frontend.topology.yaml \
#     --cwd <engine-repo> \
#     --executor codex --model gpt-5.5 \
#     --gate-cmd ".venv/bin/python -m ruff check . && .venv/bin/python -m pytest -q" \
#     --gate-setup off
#
# The node reads the engine (and an optional frontend.manifest.yaml at the repo root) and
# builds a FastAPI analyst API + Vite/React GUI + WeasyPrint PDF (HTML fallback) + a
# deterministic explainability/audit panel — NOTHING hardcoded to a specific domain.
name: analyst-frontend
nodes:
  - id: fe-builder
    role: engineer
    prompt: |
      Build a complete ANALYST FRONT-END over the EXISTING engine in this repo: a FastAPI
      analyst API + a Vite/React GUI + a WeasyPrint PDF report (HTML fallback) + a
      deterministic explainability/audit panel. The engine is a DETERMINISTIC case-scoring
      engine (it scores "cases"/"items", makes a triage/decision, may detect a network/ring,
      and keeps an audit trail). Your front-end must be DOMAIN-AGNOSTIC — derive everything
      from the engine, NOT from any one domain.

      ── DISCOVER FIRST (do NOT assume claims / trades / any domain) ──
      Read the repo to learn its surface:
        - the Python package + its public API (how you run a case end-to-end);
        - the RESULT / SCORE / REPORT models (the dataclasses / pydantic models the engine
          returns): the final score, the level/decision, the per-method or per-rule breakdown,
          evidence/findings, the network/ring (if any), the audit entry;
        - any existing FastAPI app or output renderers to REUSE;
        - the domain's OWN word for "case" (claim, trade, alert, transaction, …) — use it.
      If a `frontend.manifest.yaml` exists at the repo root, it is the CONTRACT — prefer it:
        entity, id_field, queue_columns, detail_sections, graph (node/edge source), actions,
        report_title. If absent, INFER all of these from the models above.

      ── BUILD ──
      1) ANALYST API (FastAPI, e.g. <pkg>/api/analyst.py) over the engine:
         - GET  /api/items                 → the queue (id + the manifest/inferred columns)
         - GET  /api/items/{id}            → full detail: final score, level/decision, the
                                             FULL per-method/per-rule breakdown (each with its
                                             sub-score, weight, weighted contribution,
                                             interpretation, findings), the network/ring, and
                                             the decision/triage record.
         - GET  /api/items/{id}/network    → graph as {nodes, edges} (entities + relationships)
         - GET  /api/items/{id}/audit      → the DETERMINISTIC explainability trail: how the
                                             final score was derived (each contribution), the
                                             evidence behind each, the threshold/decision
                                             crossed, and the audit entry (input hash, timestamp).
         - POST actions the engine SUPPORTS (suspend / escalate / assign / …); skip the rest.
         - GET  /api/items/{id}/report     → streams the PDF (application/pdf) or the HTML
                                             fallback (text/html).
         Bind 127.0.0.1. REUSE the engine's own functions — do NOT reimplement scoring.

      2) GUI (Vite + React + TypeScript under frontend/): Queue → Detail → NetworkGraph →
         Audit panel → actions → Download report. LESSONS — keep exactly:
         - vite.config proxy target = http://127.0.0.1:<api-port> (IPv4, NOT "localhost" — a
           VM/container proxy may squat ::1 and the API 401s). Make it env-overridable.
         - react-force-graph needs `links` (map the API's `edges` → `links`).
         - the Detail view shows the FULL breakdown (every method/rule, its weighted
           contribution + findings), the network, and the decision record — readable
           cards / tables / collapsibles.
         - an AVA-style AUDIT / EXPLAINABILITY panel: type-badged, expandable-evidence entries,
           plus a chat-shaped "Ask about this case" box wired to a DETERMINISTIC responder
           (predefined questions answered FROM the report) with a clearly-marked seam for a
           real Bedrock/LLM responder later.

      3) PDF: a ReportRenderer that emits a RICH styled report (cover; the breakdown table with
         findings; the network/ring; the decision; the score derivation) via WeasyPrint WHEN
         AVAILABLE and a clean HTML fallback otherwise. Import weasyprint LAZILY (it is NOT
         installed here) — keep the fallback. The report content is derived from the result model.

      ── ENVIRONMENT (read carefully) ──
      Use the EXISTING virtualenv: `.venv/bin/python -m ruff check .` and
      `.venv/bin/python -m pytest -q`. The NETWORK IS BLOCKED — no pip/npm install, no shims,
      no new heavy deps. WeasyPrint is NOT installed (lazy import + HTML fallback — keep it).
      The React app is SCAFFOLD-ONLY here (npm install runs later) — write COMPLETE, coherent
      source (package.json, vite.config.ts, tsconfig, index.html, src/*); do NOT run npm.

      ── TESTS (use .venv) ──
      Backend tests via FastAPI TestClient for every new route (queue, detail, network, audit,
      actions, report content-type); a test that the PDF renderer's HTML contains the breakdown
      findings + the score derivation; a test that the deterministic "ask" responder returns
      sensible answers. ALL EXISTING TESTS STILL PASS.

      ── VERIFY ──
      `.venv/bin/python -m ruff check .` and `.venv/bin/python -m pytest -q` — fix-and-rerun
      until FULLY green. React source complete + coherent. Type-hinted, docstringed, ruff-clean.
      No stubs except the documented LLM-responder seam.

      ── GENERIC MANDATE ──
      Nothing in the API, GUI, or PDF may be hardcoded to one domain. The SAME topology must
      produce a working analyst front-end for any deterministic case-scoring engine. Use the
      engine's OWN vocabulary (from the models / the manifest), not a fixed "claim"/"trade".
    tools: [Read, Write, Edit, Bash]
    gate: build-test
